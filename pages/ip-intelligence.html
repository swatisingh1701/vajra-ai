<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Intelligence | Vajra AI</title>

    <link rel="stylesheet" href="../css/ip-intelligence.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="ip-card">

        <!-- Header -->
        <div class="header">

            <h1>🌐 IP Intelligence</h1>

            <p>
                Uncover the story behind every address.
            </p>

        </div>

        <!-- Input -->
        <div class="input-section">

            <input
                type="text"
                id="ipInput"
                placeholder="Enter an IP address (e.g. 8.8.8.8)">

            <button id="lookupBtn">

                <i class="fa-solid fa-magnifying-glass"></i>
                Investigate

            </button>

        </div>

        <!-- Results -->
        <div class="results-grid">

            <div class="info-box">
                <h3>Country</h3>
                <p id="country">Awaiting lookup...</p>
            </div>

            <div class="info-box">
                <h3>Region</h3>
                <p id="region">Awaiting lookup...</p>
            </div>

            <div class="info-box">
                <h3>City</h3>
                <p id="city">Awaiting lookup...</p>
            </div>

            <div class="info-box">
                <h3>Organization</h3>
                <p id="org">Awaiting lookup...</p>
            </div>

            <div class="info-box">
                <h3>Timezone</h3>
                <p id="timezone">Awaiting lookup...</p>
            </div>

            <div class="info-box">
                <h3>IP Version</h3>
                <p id="version">Awaiting lookup...</p>
            </div>

        </div>

    </div>

</div>

<script src="../js/ip-intelligence.js"></script>

</body>
</html>
