<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer | Vajra AI</title>

    <link rel="stylesheet" href="../css/password-checker.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Main Card -->
    <div class="password-card">

        <div class="header">

            <h1>🔒 Password Strength Analyzer</h1>

            <p>
                Evaluate your password strength before attackers evaluate it for you.
            </p>

        </div>


        <!-- Input -->
        <div class="input-box">

            <input
                type="password"
                id="passwordInput"
                placeholder="Enter your password">

            <i class="fa-regular fa-eye" id="togglePassword"></i>

        </div>


        <!-- Strength Result -->
        <div class="strength-box">

            <h2>Password Strength</h2>

            <div id="strengthText">
                Waiting for analysis...
            </div>

        </div>


        <!-- Progress Bar -->
        <div class="progress-container">

            <div class="progress-bar" id="progressBar"></div>

        </div>


        <!-- Requirements -->
        <div class="requirements">

            <h3>Security Checklist</h3>

            <div class="requirement" id="lengthCheck">
                ❌ Minimum 8 characters
            </div>

            <div class="requirement" id="upperCheck">
                ❌ At least one uppercase letter
            </div>

            <div class="requirement" id="numberCheck">
                ❌ At least one number
            </div>

            <div class="requirement" id="specialCheck">
                ❌ At least one special character
            </div>

        </div>

    </div>

</div>

<script src="../js/password-checker.js"></script>

</body>
</html>
