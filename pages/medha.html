<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDHA AI | Vajra AI</title>

    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/medha.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="medha-container">

    <!-- Header -->
    <div class="medha-header">

        <a href="dashboard.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Dashboard
        </a>

        <div class="header-title">
            <h1>🧠 MEDHA AI</h1>
            <p class="subtitle">Wisdom. Security. Guidance.</p>
        </div>

        <div class="online-indicator">
            <span class="online-dot"></span>
            <span class="online-text">Online</span>
        </div>

    </div>

    <div class="medha-content">

        <!-- Chat Section -->
        <div class="chat-card">

            <div id="chat-box">

                <div class="bot-message">
                    Hello! I'm MEDHA AI. Ask me anything related to cybersecurity.
                </div>

            </div>

            <div class="input-area">

                <input
                    type="text"
                    id="user-input"
                    placeholder="Ask a cybersecurity question...">

                <button id="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>

            </div>

        </div>

    </div>

</div>

<script src="../js/medha.js"></script>

</body>
</html>
