<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Generator | Vajra AI</title>

    <link rel="stylesheet" href="../css/password-generator.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <a href="dashboard.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Dashboard
            </a>

    <div class="container">

        <div class="generator-card">

            <!-- Header -->
            <div class="header">

                <h1>🔑 Password Generator</h1>

                <p>
                    Build passwords attackers wish you never created.
                </p>

            </div>

            <!-- Password Output -->
            <div class="password-box">

                <input
                    type="text"
                    id="generatedPassword"
                    readonly
                    placeholder="Your generated password will appear here">

                <button id="copyBtn">

                    <i class="fa-regular fa-copy"></i>
                    Copy

                </button>

            </div>

            <!-- Options -->
            <div class="options">

                <label>
                    <input type="checkbox" id="uppercase" checked>
                    Include Uppercase Letters
                </label>

                <label>
                    <input type="checkbox" id="lowercase" checked>
                    Include Lowercase Letters
                </label>

                <label>
                    <input type="checkbox" id="numbers" checked>
                    Include Numbers
                </label>

                <label>
                    <input type="checkbox" id="symbols" checked>
                    Include Symbols
                </label>

            </div>

            <!-- Length -->
            <div class="length-section">

                <label for="lengthSlider">

                    Password Length

                </label>

                <input
                    type="range"
                    id="lengthSlider"
                    min="8"
                    max="32"
                    value="16">

                <span id="lengthValue">

                    16 Characters

                </span>

            </div>

            <!-- Generate Button -->
            <button id="generateBtn">

                <i class="fa-solid fa-key"></i>
                Generate Secure Password

            </button>

            <!-- Recommendation Card -->
            <div class="recommendation-card">

                <h3>

                    <i class="fa-solid fa-shield-halved"></i>
                    Security Recommendation

                </h3>

                <p>

                    Longer passwords with uppercase letters, numbers, and symbols provide stronger protection against brute-force attacks.

                </p>

            </div>

        </div>

    </div>

    <script src="../js/password-generator.js"></script>

</body>

</html>
